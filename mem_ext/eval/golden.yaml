# Golden queries — шаблон. Замени на собственные.
#
# Каждый запрос утверждает, что в top-K результатах должно оказаться
# хотя бы `min_hits` документов, текст которых содержит одно из
# `any_keywords`. Прогон: `anamnesis eval --mode hybrid`.
#
# Смысл не в достижении 100 %, а в baseline для регрессии:
# после любого изменения (смена модели, правка tokenizer, веса RRF)
# прогоняешь снова и сравниваешь числа с прошлым запуском.
#
# Как выбирать запросы:
#   - темы, про которые ты точно знаешь, что они обсуждались в истории;
#   - формулировка — как реально будешь искать (обобщённо, не точно-по-словам);
#   - в any_keywords — точные токены, которые должны оказаться в хитах
#     (имена файлов, идентификаторы, IP, CVE, ключевые термины).

queries:
  - query: "пример обобщённого запроса на естественном языке"
    any_keywords: ["точный_токен_1", "точный_токен_2"]
    min_hits: 1
    top_k: 10

  - query: "другая тема, которую точно обсуждал(а)"
    any_keywords: ["идентификатор"]
    min_hits: 2

  # Добавь ещё 15–30 записей под свой корпус.
